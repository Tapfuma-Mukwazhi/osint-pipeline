name: OSINT Pipeline

on:
  schedule:
    # Every 6 hours. GitHub Actions cron runs in UTC and can lag under load --
    # fine for a collection job, not fine for anything time-critical.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v

  collect:
    # Only run the actual collection on schedule/manual trigger, not on
    # every PR -- no reason to hit external feeds for a code-only change.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run collection pipeline
        env:
          # Optional. If unset, vt_domain_lookup.py fails gracefully and the
          # rest of the pipeline still runs -- see that module's docstring.
          # Set via: repo Settings -> Secrets and variables -> Actions -> New secret
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: python -m src.pipeline
      - name: Commit updated dataset
        run: |
          git config user.name "osint-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/osint.db
          git diff --cached --quiet && echo "No new data, skipping commit" || git commit -m "Automated collection run [skip ci]"
          git push
